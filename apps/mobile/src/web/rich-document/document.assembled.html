<!-- 由 assemble-webview-html.mjs 生成，禁止手改。重新生成：npm run assemble:webview-html -w @novel-master/mobile -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg, #fff); color: var(--text, #111); font-family: system-ui, -apple-system, sans-serif; }
#doc-wrap { height: 100%; overflow: hidden; }
/* FM + body + hint scroll together inside #doc (no separate RN FM card). */
#doc { height: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 12px; font-size: 15px; line-height: 1.45; }
.doc-body { margin-top: 0; white-space: pre-wrap; word-break: break-word; }
.doc-body.rich { white-space: normal; }
.fm-card { margin-bottom: 16px; padding: 12px; border-radius: 10px; border: 1px solid var(--border, #e5e5ea); background: var(--surface, #f2f2f7); }
.fm-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary, #666); margin-bottom: 8px; }
.fm-error { font-size: 13px; color: #ff3b30; margin-bottom: 6px; }
.fm-empty { font-size: 13px; color: var(--text-secondary, #666); }
.fm-row { margin-bottom: 6px; }
.fm-key { font-size: 12px; font-weight: 500; color: var(--text-secondary, #666); }
.fm-value { font-size: 15px; line-height: 21px; color: var(--text, #111); }
.fm-mono { font-family: ui-monospace, monospace; }
.over-limit-hint { margin-top: 6px; font-size: 12px; color: var(--text-secondary, #666); }
#doc .doc-body.rich { white-space: normal; overflow-wrap: anywhere; }
    #doc .doc-body.rich p { margin: 0.35em 0; }
    #doc .doc-body.rich p:first-child { margin-top: 0; }
    #doc .doc-body.rich p:last-child { margin-bottom: 0; }
    /* Global reset strips list padding; indent so outside markers stay inside the content area. */
    #doc .doc-body.rich ol, #doc .doc-body.rich ul { margin: 0.35em 0; padding-left: 1.5em; list-style-position: outside; }
    #doc .doc-body.rich ul ul, #doc .doc-body.rich ol ol, #doc .doc-body.rich ul ol, #doc .doc-body.rich ol ul { margin-top: 0.2em; margin-bottom: 0; padding-left: 1.25em; }
    #doc .doc-body.rich li { margin: 0.15em 0; }
    #doc .doc-body.rich li + li { margin-top: 0.25em; }
    #doc .doc-body.rich li > p { margin: 0; }
    #doc .doc-body.rich strong, #doc .doc-body.rich b { font-weight: 600; }
    #doc .doc-body.rich hr {
      border: none;
      border-top: 1px solid var(--border, #e5e5ea);
      margin: 0.5em 0;
      opacity: 0.85;
    }
    #doc .doc-body.rich blockquote {
      margin: 0.35em 0; padding-left: 0.75em;
      border-left: 3px solid var(--border, #e5e5ea);
    }
    #doc .doc-body.rich h1 { font-size: 1.15em; font-weight: 700; margin: 0.4em 0 0.3em; }
    #doc .doc-body.rich h2 { font-size: 1.08em; font-weight: 700; margin: 0.38em 0 0.28em; }
    #doc .doc-body.rich h3 { font-size: 1em; font-weight: 700; margin: 0.35em 0; }
    #doc .doc-body.rich code { font-family: ui-monospace, monospace; font-size: 0.9em; background: rgba(0,0,0,0.06); padding: 0.1em 0.25em; border-radius: 4px; }
    #doc .doc-body.rich pre { overflow-x: auto; margin: 0.35em 0; }
    #doc .doc-body.rich a { color: var(--primary, #007aff); }

  </style>
</head>
<body>
  <div id="doc-wrap"><div id="doc"></div></div>
  <script>(function () {
/**
 * rich-document WebView boot 正文（assemble 外包 IIFE）。
 */
var BRIDGE_V = 1;
  var OVER_LIMIT_HINT = '内容过长，已显示原文';

  function post(type, payload) {
    var msg = JSON.stringify({ v: BRIDGE_V, type: type, payload: payload || {} });
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(msg);
    }
  }

  function applyTheme(theme) {
    if (!theme) return;
    var root = document.documentElement;
    if (theme.background) root.style.setProperty('--bg', theme.background);
    if (theme.text) root.style.setProperty('--text', theme.text);
    if (theme.textSecondary) root.style.setProperty('--text-secondary', theme.textSecondary);
    if (theme.primary) root.style.setProperty('--primary', theme.primary);
    if (theme.surface) root.style.setProperty('--surface', theme.surface);
    if (theme.borderLight) root.style.setProperty('--border', theme.borderLight);
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function setDocument(payload) {
    var doc = document.getElementById('doc');
    if (!doc) return;
    var fm = (payload && payload.frontMatterHtml) || '';
    var mode = payload && payload.mode;
    var overLimit = !!(payload && payload.overLimit);
    var bodyHtml = '';
    if (mode === 'html' && payload.html) {
      bodyHtml = '<div class="doc-body rich">' + payload.html + '</div>';
    } else if (payload.plain) {
      bodyHtml =
        '<div class="doc-body">' + escapeHtml(payload.plain) + '</div>';
    }
    var hint = overLimit
      ? '<div class="over-limit-hint">' + OVER_LIMIT_HINT + '</div>'
      : '';
    doc.innerHTML = fm + bodyHtml + hint;
  }

  function handleHostMessage(raw) {
    var msg;
    try {
      msg = JSON.parse(raw);
    } catch (e) {
      return;
    }
    if (!msg || msg.v !== BRIDGE_V) return;
    if (msg.type === 'init') {
      applyTheme(msg.payload && msg.payload.theme);
      return;
    }
    if (msg.type === 'setDocument') {
      setDocument(msg.payload);
      return;
    }
    if (msg.type === 'themeUpdate') {
      applyTheme(msg.payload && msg.payload.theme);
    }
  }

  document.addEventListener('message', function (e) {
    handleHostMessage(e.data);
  });
  window.addEventListener('message', function (e) {
    handleHostMessage(e.data);
  });

  post('ready', { version: 1 });

})();</script>
</body>
</html>
