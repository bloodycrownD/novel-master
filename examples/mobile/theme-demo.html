<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主题演示 - 移动端原型</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/theme-enhancements.css">
    <style>
        body {
            padding: 20px;
            max-width: 428px;
            margin: 0 auto;
        }
        
        .demo-section {
            margin-bottom: 32px;
        }
        
        .demo-section h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .color-swatch {
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }
        
        .swatch-primary { background: var(--primary-color); color: white; }
        .swatch-success { background: var(--success-color); color: white; }
        .swatch-warning { background: var(--warning-color); color: white; }
        .swatch-danger { background: var(--danger-color); color: white; }
        .swatch-bg { background: var(--bg-color); color: var(--text-primary); border: 1px solid var(--border-color); }
        .swatch-surface { background: var(--surface-color); color: var(--text-primary); border: 1px solid var(--border-color); }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .demo-card {
            background: var(--surface-elevated);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: all var(--transition-speed) ease;
        }
        
        .demo-card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }
        
        .demo-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .demo-card p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        .theme-toggle-demo {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .demo-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            background: var(--surface-color);
            color: var(--text-primary);
            margin-bottom: 12px;
            transition: all var(--transition-speed) ease;
        }
        
        .demo-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }
        
        .demo-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
        }
        
        .badge-primary { background: var(--primary-color); color: white; }
        .badge-success { background: var(--success-color); color: white; }
        .badge-warning { background: var(--warning-color); color: white; }
    </style>
</head>
<body>
    <button id="themeToggle" class="icon-btn theme-toggle theme-toggle-demo" aria-label="切换主题">
        <svg class="theme-icon theme-icon-light" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-icon theme-icon-dark" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <h1 style="font-size: 28px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary);">主题系统演示</h1>
    <p style="color: var(--text-secondary); margin-bottom: 32px;">点击右上角按钮切换浅色/深色主题</p>

    <div class="demo-section">
        <h2>颜色系统</h2>
        <div class="demo-grid">
            <div class="color-swatch swatch-primary">主色</div>
            <div class="color-swatch swatch-success">成功</div>
            <div class="color-swatch swatch-warning">警告</div>
            <div class="color-swatch swatch-danger">危险</div>
            <div class="color-swatch swatch-bg">背景色</div>
            <div class="color-swatch swatch-surface">表面色</div>
        </div>
    </div>

    <div class="demo-section">
        <h2>按钮样式</h2>
        <div class="button-group">
            <button class="btn-primary">主要按钮</button>
            <button class="btn-secondary">次要按钮</button>
            <button class="btn-danger">危险按钮</button>
            <button class="btn-primary btn-sm">小按钮</button>
        </div>
    </div>

    <div class="demo-section">
        <h2>卡片组件</h2>
        <div class="demo-card">
            <h3>卡片标题</h3>
            <p>这是一个演示卡片，展示了圆角、阴影和悬停效果。鼠标悬停时会有轻微的上浮动画。</p>
            <div style="margin-top: 12px;">
                <span class="demo-badge badge-primary">标签1</span>
                <span class="demo-badge badge-success">标签2</span>
                <span class="demo-badge badge-warning">标签3</span>
            </div>
        </div>
        <div class="demo-card">
            <h3>另一个卡片</h3>
            <p>所有组件都支持主题切换，并且有平滑的过渡动画。</p>
        </div>
    </div>

    <div class="demo-section">
        <h2>表单元素</h2>
        <input type="text" class="demo-input" placeholder="输入文本...">
        <input type="text" class="demo-input" placeholder="聚焦时会有蓝色边框">
        <textarea class="demo-input" rows="3" placeholder="多行文本输入..."></textarea>
    </div>

    <div class="demo-section">
        <h2>消息气泡</h2>
        <div class="message user" style="margin-bottom: 16px;">
            <div class="message-content">这是用户发送的消息</div>
        </div>
        <div class="message assistant">
            <div class="message-content">这是 AI 助手的回复消息</div>
        </div>
    </div>

    <div class="demo-section">
        <h2>工具调用卡片</h2>
        <div class="tool-call">
            <div class="tool-header">
                <span class="tool-name">📄 read_file</span>
                <span class="tool-status success">成功</span>
            </div>
            <div class="tool-summary">读取 /chapters/chapter-03.md</div>
        </div>
    </div>

    <div class="demo-section">
        <h2>信息横幅</h2>
        <div class="info-banner" style="margin-bottom: 12px;">
            <span>💡 这是一个普通的信息提示</span>
        </div>
        <div class="info-banner warning">
            <span>⚠️ 这是一个警告提示</span>
        </div>
    </div>

    <div style="height: 40px;"></div>

    <script>
        const THEME_STORAGE_KEY = 'nm-mobile-theme';
        
        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_STORAGE_KEY) || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem(THEME_STORAGE_KEY, newTheme);
        }
        
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        initTheme();
    </script>
</body>
</html>
