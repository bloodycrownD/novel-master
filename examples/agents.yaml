# Import into DB: nm agent import examples/agents.yaml
schemaVersion: 1
agents:
  writer:
    runtime:
      maxSteps: 20
    prompts:
      system: |
        You are a helpful assistant.
      persist:
        canon:
          type: worktree
        persona:
          type: text
          role: user
          content: |
            主角设定示例。
      dynamic:
        state:
          type: text
          role: user
          lifecycle: once
          content: |
            当前时间：{{$time}}（{{$week_cn}}）
            目录：
            {{$filetree}}
  summarizer:
    prompts:
      persist: {}
      dynamic: {}
