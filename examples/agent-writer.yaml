schemaVersion: 1
name: writer
model:
  applicationModelId: zhipu/glm-4.6
  params:
    protocol: openai
    openai:
      temperature: 0.7
      top_p: 0.9
runtime:
  maxSteps: 20
compact:
  trigger:
    tokenThreshold: 12000
    floorThreshold: 20
  action:
    keepLastN: 6
    abstract:
      type: agent
prompts:
  blocks:
    - name: system
      type: text
      role: system
      content: "You are a helpful assistant."
    - name: abstract
      type: abstract
      content: |
        压缩后的内容如下：
        {{.abstract}}
    - name: history
      type: chat
